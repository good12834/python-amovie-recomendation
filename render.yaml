services:
  - type: web
    name: moviebuddy-api
    runtime: python
    buildCommand: cd moviebuddy-web/backend && pip install -r requirements.txt
    startCommand: cd moviebuddy-web/backend && python -m gunicorn app:app
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false